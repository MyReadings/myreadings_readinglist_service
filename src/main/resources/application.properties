# Readinglist Service Configuration
db.host=${POSTGRES_HOSTNAME:localhost}
db.port=${POSTGRES_PORT_CONTAINER:5432}
db.user=${POSTGRES_USER:myreadings-user}
db.password=${POSTGRES_PASSWORD:supersecretpassword}

quarkus.devservices.enabled=false
quarkus.application.name=readinglist-service
quarkus.http.port=8084
app.repository.type=jpa
app.readinglist.enrichment-strategy=${APP_READINGLIST_ENRICHMENT_STRATEGY:hexagonal}
smallrye.jwt.path.groups=realm_access/roles

%dev.quarkus.oidc.auth-server-url=http://${KEYCLOAK_HOSTNAME:localhost}:${KEYCLOAK_PORT_CONTAINER:8080}/realms/${KEYCLOAK_REALM:my-readings}
%dev.quarkus.oidc.token.issuer=http://localhost:${KEYCLOAK_PORT_HOST:8080}/realms/${KEYCLOAK_REALM:my-readings}
%prod.quarkus.oidc.auth-server-url=http://${KEYCLOAK_HOSTNAME:localhost}:${KEYCLOAK_PORT_CONTAINER:8080}/realms/${KEYCLOAK_REALM:my-readings}
%prod.quarkus.oidc.token.issuer=http://localhost:${KEYCLOAK_PORT_HOST:8080}/realms/${KEYCLOAK_REALM:my-readings}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:myreadings-client}
quarkus.oidc.credentials.secret=${KC_ADMIN_PASSWORD:admin}
quarkus.oidc.tls.verification=none

# RabbitMQ - consume user-profile-created events
mp.messaging.connector.smallrye-rabbitmq.host=${RABBITMQ_HOSTNAME:localhost}
mp.messaging.connector.smallrye-rabbitmq.port=${RABBITMQ_PORT_CONTAINER:5672}
mp.messaging.connector.smallrye-rabbitmq.username=${RABBITMQ_APP_USER:myreadings-user}
mp.messaging.connector.smallrye-rabbitmq.password=${RABBITMQ_APP_PASSWORD:myreadings-user}
mp.messaging.connector.smallrye-rabbitmq.virtual-host=${RABBITMQ_VHOST:my-readings}

mp.messaging.incoming.user-profile-created.connector=smallrye-rabbitmq
mp.messaging.incoming.user-profile-created.exchange.name=user-events
mp.messaging.incoming.user-profile-created.exchange.type=fanout
mp.messaging.incoming.user-profile-created.exchange.declare=true
mp.messaging.incoming.user-profile-created.queue.name=readinglist-user-created-queue

# REST Clients
quarkus.rest-client.catalog-service.url=${CATALOG_SERVICE_URL:http://myreadings-catalog-service:8082}
quarkus.rest-client.catalog-service.connect-timeout=2000
quarkus.rest-client.catalog-service.read-timeout=5000
quarkus.rest-client.user-service.url=${USER_SERVICE_URL:http://myreadings-user-service:8083}
quarkus.rest-client.user-service.connect-timeout=2000
quarkus.rest-client.user-service.read-timeout=5000

# ReadingList DB
quarkus.datasource."readinglist-db".db-kind=postgresql
quarkus.datasource."readinglist-db".username=${db.user}
quarkus.datasource."readinglist-db".password=${db.password}
quarkus.datasource."readinglist-db".jdbc.max-size=30
quarkus.datasource."readinglist-db".jdbc.min-size=5
quarkus.datasource."readinglist-db".jdbc.acquisition-timeout=5
quarkus.hibernate-orm."readinglist-db".datasource=readinglist-db
quarkus.hibernate-orm."readinglist-db".packages=org.modular.playground.readinglist.infrastructure.persistence.postgres
quarkus.hibernate-orm."readinglist-db".jdbc.batch-size=25
quarkus.hibernate-orm."readinglist-db".properties."hibernate.default_batch_fetch_size"=16

%dev.quarkus.datasource."readinglist-db".jdbc.url=jdbc:postgresql://${db.host}:${db.port}/readinglist_db
%prod.quarkus.datasource."readinglist-db".jdbc.url=jdbc:postgresql://${db.host}:${db.port}/readinglist_db

# OpenTelemetry
quarkus.otel.service.name=myreadings-readinglist-service
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.traces.protocol=grpc
quarkus.otel.logs.enabled=true
quarkus.otel.exporter.otlp.logs.protocol=grpc
quarkus.otel.metrics.enabled=true
quarkus.datasource."readinglist-db".jdbc.telemetry=true

# Logging
quarkus.oidc.token-cache.max-size=100

quarkus.log.level=INFO
quarkus.log.category."org.hibernate".level=WARN
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false

%dev.quarkus.devservices.enabled=false
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=/.*/
%dev.quarkus.log.console.json=false
%dev.quarkus.log.console.json.pretty-print=false
